<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Admin | Jenny.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page">
    <main class="login-card">
        <a class="login-brand" href="{{ url_for('main.home') }}">Jenny.</a>
        <span class="login-icon"><i class="bi bi-flower2"></i></span>
        <h1>Masuk ke Dashboard</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}<div class="login-alert">{{ message }}</div>{% endfor %}
        {% endwith %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Email
                <span class="input-wrap"><i class="bi bi-envelope"></i><input type="email" name="email" placeholder="admin@email.com" required autofocus></span>
            </label>
            <label>Password
                <span class="input-wrap"><i class="bi bi-lock"></i><input type="password" name="password" id="password" placeholder="Masukkan password" required><button type="button" class="password-toggle" aria-label="Tampilkan password"><i class="bi bi-eye"></i></button></span>
            </label>
            <label class="remember"><input type="checkbox" name="remember"> Ingat saya</label>
            <button class="login-button" type="submit">Masuk <i class="bi bi-arrow-right"></i></button>
        </form>
        <a class="back-link" href="{{ url_for('main.home') }}"><i class="bi bi-arrow-left"></i> Kembali ke website</a>
    </main>
    <script>
        const toggle = document.querySelector('.password-toggle');
        const password = document.getElementById('password');
        toggle?.addEventListener('click', () => {
            password.type = password.type === 'password' ? 'text' : 'password';
            toggle.querySelector('i').className = password.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
        });
    </script>
</body>
</html>
